# File Organization System Configuration
system:
  analysis_depth: "comprehensive"  # basic, standard, comprehensive
  backup_before_changes: true
  create_reports: true
  
file_organization:
  categories:
    documents: [".pdf", ".doc", ".docx", ".txt", ".rtf", ".odt"]
    images: [".jpg", ".jpeg", ".png", ".gif", ".bmp", ".svg", ".webp"]
    videos: [".mp4", ".avi", ".mkv", ".mov", ".wmv", ".flv", ".webm"]
    audio: [".mp3", ".wav", ".flac", ".aac", ".ogg", ".wma"]
    archives: [".zip", ".rar", ".7z", ".tar", ".gz", ".bz2"]
    code: [".py", ".js", ".html", ".css", ".cpp", ".java", ".c", ".php"]
    spreadsheets: [".xls", ".xlsx", ".csv", ".ods"]
    presentations: [".ppt", ".pptx", ".odp"]
  
  organization_rules:
    create_year_folders: true
    create_type_folders: true
    remove_duplicates: true
    optimize_names: true

cloud:
  providers:
    aws:
      enabled: false
      bucket_name: ""
      region: "us-east-1"
    google:
      enabled: false
      bucket_name: ""
      project_id: ""
    azure:
      enabled: false
      container_name: ""
      account_name: ""
  
  sync_options:
    auto_upload: false
    compress_before_upload: true
    encryption_enabled: true

layout:
  style: "professional"  # professional, minimal, dynamic
  theme: "modern"       # modern, classic, corporate
  generate_thumbnails: true
  create_shortcuts: true
  organize_desktop: true